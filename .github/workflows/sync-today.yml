name: Sincronização de Jogos ao Vivo/Concluídos Hoje

on:
  schedule:
    # Roda todo minuto 0 de cada hora (ex: 12:00, 13:00, 14:00UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite rodar manualmente no painel Actions

jobs:
  sync_matches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar Dependências
        run: npm install

      - name: Executar Sync Hoje
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_FOOTBALL_KEY: ${{ secrets.VITE_API_FOOTBALL_KEY }}
        run: node scripts/syncToday.js
