name: Stats Sync (hourly safety net)
# Live scores + ticket settlement are now handled by the Supabase Edge Function
# (sync-live), scheduled every 2 min via pg_cron.
# This workflow keeps running syncMissingStats to populate teams_history
# (needed for corner/card picks) and remains a fallback if the Edge Function fails.

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

jobs:
  sync-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Dependencies
        run: npm install
      - name: Sync Missing Stats
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/syncMissingStats.js
