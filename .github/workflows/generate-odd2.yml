name: Geração da Múltipla ODD 2.0 Diária

on:
  schedule:
    # Roda todo dia às 06:00 UTC (03:00 Horário de Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate_ticket:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar Dependências
        run: npm install

      - name: Avaliar Ticket de Ontem (Retro PWA)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_FOOTBALL_KEY: ${{ secrets.VITE_API_FOOTBALL_KEY }}
        run: node scripts/evaluateOdd2.js

      - name: Gerar Bilhete Odd 2.0 (Hoje)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_FOOTBALL_KEY: ${{ secrets.VITE_API_FOOTBALL_KEY }}
        run: node scripts/generateOdd2.js
